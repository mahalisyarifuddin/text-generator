<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Test Text Generator</title>
	<style>
		:root {
			--primary: #005dac;
			--on-primary: #ffffff;
			--hover: #00539a;
			--background: #f9f9ff;
			--surface: #ffffff;
			--text: #181c21;
			--border: #c1c6d4;
			--muted: #f2f3fc;
			--success: #0b6b1d;
			--on-success: #ffffff;
			--danger: #ba1a1a;
			--on-danger: #ffffff;
			--highlight-bg: #d4e3ff;
		}
		@media (prefers-color-scheme: dark) {
			:root:not(.light) {
				--primary: #a5c8ff;
				--on-primary: #00315f;
				--hover: #72adff;
				--background: #101319;
				--surface: #0b0e14;
				--text: #e0e2ea;
				--border: #414752;
				--muted: #181c21;
				--success: #82db7e;
				--on-success: #00390a;
				--danger: #ffb4ab;
				--on-danger: #93000a;
				--highlight-bg: #001c3a;
			}
		}
		:root.dark {
			--primary: #a5c8ff;
			--on-primary: #00315f;
			--hover: #72adff;
			--background: #101319;
			--surface: #0b0e14;
			--text: #e0e2ea;
			--border: #414752;
			--muted: #181c21;
			--success: #82db7e;
			--on-success: #00390a;
			--danger: #ffb4ab;
			--on-danger: #93000a;
			--highlight-bg: #001c3a;
		}
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			outline-offset: 2px;
		}
		*:focus-visible {
			outline: 2px solid var(--primary);
		}
		body {
			background: var(--background);
			color: var(--text);
			font-family: sans-serif;
			display: flex;
			justify-content: center;
			min-height: 100vh;
			padding: 1rem;
		}
		.container {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 8px;
			max-width: 960px;
			padding: 2rem;
			width: 100%;
			position: relative;
			margin: 2rem 0;
		}
		.hidden {
			display: none !important;
		}
		h1, h2, h3, label {
			margin: .5rem 0;
		}
		label {
			display: block;
			font-weight: 700;
		}
		input, select, button, textarea {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 4px;
			color: var(--text);
			font-size: 1rem;
			padding: .5rem;
			width: 100%;
		}
		textarea {
			resize: vertical;
			min-height: 80px;
		}
		button {
			cursor: pointer;
		}
		button:disabled {
			opacity: .6;
			cursor: not-allowed;
		}
		.primary {
			background: var(--primary);
			color: var(--on-primary);
			border: 0;
		}
		.primary:hover:not(:disabled) {
			background: var(--hover);
		}
		.secondary:hover:not(:disabled) {
			background: var(--muted);
		}
		.danger {
			background: var(--danger);
			color: var(--on-danger);
			border: 0;
		}
		.success {
			background: var(--success);
			color: var(--on-success);
			border: 0;
		}
		.selectors {
			position: absolute;
			right: 2rem;
			top: 1rem;
			display: flex;
			gap: 8px;
		}
		.selectors select {
			width: auto;
			font-size: .9rem;
		}
		.row {
			display: flex;
			gap: 1rem;
			margin-bottom: 1rem;
		}
		.group {
			flex: 1;
		}
		table {
			border-collapse: collapse;
			margin-top: 1rem;
			width: 100%;
			font-size: .9rem;
		}
		th, td {
			border: 1px solid var(--border);
			padding: .5rem;
			text-align: left;
		}
		th {
			background: var(--primary);
			color: var(--on-primary);
		}
		.error {
			color: var(--danger);
			font-size: .9rem;
			margin: 1rem 0;
			display: block;
			font-weight: 500;
		}
		.info {
			font-size: .9rem;
			opacity: .8;
			line-height: 1.6;
		}
		#output {
			margin-top: 1rem;
			padding: 1rem;
			background: var(--muted);
			border-radius: 4px;
			white-space: pre-wrap;
			font-family: monospace;
			max-height: 400px;
			overflow-y: auto;
		}
		@media(max-width: 768px) {
			.selectors {
				position: static;
				justify-content: end;
				margin-bottom: .5rem;
			}
			.row {
				flex-direction: column;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="selectors">
			<select id="language"><option value="en">English</option><option value="id">Bahasa Indonesia</option></select>
			<select id="theme"><option value="auto">Auto</option><option value="light">Light</option><option value="dark">Dark</option></select>
		</div>
		<h1 id="title"></h1>
		<p id="subtitle" class="info"></p>

		<div class="row">
			<div class="group">
				<label for="tsvFile">Trigram TSV File</label>
				<input type="file" id="tsvFile" accept=".tsv,.txt">
			</div>
		</div>

		<div class="row">
			<div class="group">
				<label for="seedInput">Seed</label>
				<input type="number" id="seedInput" value="42">
			</div>
			<div class="group">
				<label for="textLengthInput">Text Length</label>
				<input type="number" id="textLengthInput" value="1000">
			</div>
		</div>

		<div class="row">
			<div class="group">
				<label for="letterVarietyInput">Letter Variety (0-100)</label>
				<input type="range" id="letterVarietyInput" min="0" max="100" value="0">
			</div>
			<div class="group">
				<label for="pairVarietyInput">Pair Variety (0-100)</label>
				<input type="range" id="pairVarietyInput" min="0" max="100" value="0">
			</div>
		</div>

		<div class="row">
			<div class="group">
				<label for="caseModeInput">Case Mode</label>
				<select id="caseModeInput">
					<option value="normal">Normal</option>
					<option value="allcaps">All Caps</option>
					<option value="capitalized">Capitalized</option>
				</select>
			</div>
			<div class="group">
				<label for="kerningLevelInput">Kerning Level</label>
				<select id="kerningLevelInput">
					<option value="s3">Suppress -3</option>
					<option value="s2">Suppress -2</option>
					<option value="s1">Suppress -1</option>
					<option value="0" selected>None (0)</option>
					<option value="b1">Boost 1</option>
					<option value="b2">Boost 2</option>
					<option value="b3">Boost 3</option>
				</select>
			</div>
		</div>

		<button id="generateBtn" class="primary">Generate Text</button>

		<div id="output"></div>
	</div>

				const textLength = parseInt(elements.textLengthInput.value);
				const letterVariety = parseInt(elements.letterVarietyInput.value);
				const pairVariety = parseInt(elements.pairVarietyInput.value);
				const caseMode = elements.caseModeInput.value;
				const kerningLevel = elements.kerningLevelInput.value;

				const lines = this.tsvData.split(/\r?\n/);
				if (lines.length === 0) return;
				lines.shift(); // skip header

				const wordlen_in = new Array(51).fill(1);
				let wordsum_in = 6;

				let i = 0;
				while (i < lines.length) {
					const parts = lines[i].split('\t');
					if (parts.length < 2) { i++; continue; }
					const count = parseInt(parts[0]);
					const key = parts[1].trim();
					if (key.startsWith('word')) {
						const idx = parseInt(key.substring(4, 7));
						if (!isNaN(idx)) {
							wordlen_in[idx] += count;
							wordsum_in += count;
						}
						i++;
					} else break;
				}

				const remainingLines = lines.slice(i);
				const duplets = {};
				for (const line of remainingLines) {
					const parts = line.split('\t');
					if (parts.length < 2) continue;
					const v = parseInt(parts[0]);
					const t_raw = parts[1].replace(/[\r\n]/g, '');

					let t = "";
					for (const char of t_raw) {
						if (caseMode === "allcaps" && casedict[char]) t += casedict[char];
						else t += char;
					}

					if (caseMode === "capitalized") {
						if ((t[0] === '_' && casedict[t[1]]) || (t[1] === '_' && casedict[t[2]])) continue;
					}

					const d_key = t.substring(0, 2);
					const d_val = t.substring(2);
					if (!duplets[d_key]) duplets[d_key] = {};
					duplets[d_key][d_val] = (duplets[d_key][d_val] || 0) + v;
				}

				// Clean dead ends
				for (let step = 0; step < 2; step++) {
					const toDelete = [];
					for (const d in duplets) {
						let hasPath = false;
						for (const v in duplets[d]) {
							if (duplets[d[1] + v]) {
								hasPath = true;
							} else {
								// letter dead end
								delete duplets[d][v];
							}
						}
						if (Object.keys(duplets[d]).length === 0) toDelete.push(d);
					}
					toDelete.forEach(d => delete duplets[d]);
				}

				const kernglobal = { "s3": -1.0, "s2": -0.6, "s1": -0.3, "0": 0, "b1": 0.3, "b2": 0.6, "b3": 0.9 }[kerningLevel] || 0;
				const kerntweaks = {};
				if (kernglobal !== 0) {
					for (const kp in kerningDataFull) {
						kerntweaks[kp] = Math.pow(kerningDataFull[kp], kernglobal);
					}
				}

				const equalization = 0.007 * letterVariety;
				const equalisPair = 0.01 * pairVariety;
				const wordlen_out = new Array(51).fill(1);
				let wordsum_out = 4;
				let current = "._";
				let wordtmp = 0;
				let file_output = "";
				const freq_m = {}, freq_m_uc = {}, pair_m = {};
				let freq_total = 1, freq_total_uc = 1, pair_total = 1;
				let num_l = 0, num_l_uc = 0, num_pairs = 0;

				for (let j = 0; j < textLength; j++) {
					if (lettersSet.includes(current[1])) wordtmp++;
					else {
						if (lettersSet.includes(current[0])) {
							const wlen = Math.min(wordtmp, 50);
							wordlen_out[wlen]++;
							wordsum_out++;
						}
						wordtmp = 0;
					}

					let tweakblank = 1;
					if (wordtmp >= 6) tweakblank = (wordtmp - 6 + 1) * 60;
					else if (wordtmp !== 0) {
						tweakblank = Math.pow((wordlen_in[Math.min(wordtmp, 50)] * wordsum_out) / (wordlen_out[Math.min(wordtmp, 50)] * wordsum_in), 4);
						if (wordtmp > 15 && tweakblank < equalization * 50) tweakblank = equalization * 50 + 2;
						tweakblank = Math.max(0.25, Math.min(30.0, tweakblank));
					}

					if (duplets[current] && Object.keys(duplets[current]).length > 0) {
						const options = Object.keys(duplets[current]).sort();
						const cumulative = [];
						let running_sum = 1;
						for (const nextChar of options) {
							let tweakl = 1;
							if ((lowercaseSet + arabicSet).includes(nextChar)) {
								if (!freq_m[nextChar]) { freq_m[nextChar] = 1; num_l++; }
								tweakl = 1.0 + equalization * ((freq_total / freq_m[nextChar] / num_l) * 5 - 1);
							} else if (uppercaseSet.includes(nextChar)) {
								if (!freq_m_uc[nextChar]) { freq_m_uc[nextChar] = 1; num_l_uc++; }
								tweakl = 1.0 + equalization * ((freq_total_uc / freq_m_uc[nextChar] / num_l_uc) * 5 - 1);
							} else tweakl = tweakblank;

							const pair = current[1] + nextChar;
							if (!pair_m[pair]) { pair_m[pair] = 4; num_pairs++; }
							let tweakp = pair.includes('_') ? 1.0 : 1.0 + equalisPair * ((pair_total / pair_m[pair] / num_pairs) * 5 - 1);
							const tweakkern = kerntweaks[pair] || 1;

							running_sum += duplets[current][nextChar] * tweakl * tweakp * tweakkern;
							cumulative.push(running_sum);
						}

						const correction = 55000.0 / running_sum;
						const randm = random() * 55000;
						let chosenNext = options[options.length - 1];
						for (let k = 0; k < cumulative.length; k++) {
							if (randm < cumulative[k] * correction) {
								chosenNext = options[k];
								break;
							}
						}

						current = current[1] + chosenNext;
						file_output += chosenNext === "_" ? " " : chosenNext;
						if (freq_m[chosenNext] !== undefined) { freq_m[chosenNext]++; freq_total++; }
						if (freq_m_uc[chosenNext] !== undefined) { freq_m_uc[chosenNext]++; freq_total_uc++; }
						if (pair_m[current] !== undefined) { pair_m[current]++; pair_total++; }
					} else {
						const next_c = "_";
						current = current[1] + next_c;
						file_output += " ";
					}
				}
				elements.output.textContent = file_output;
			}
		}
		new TextGeneratorApp();
	</script>
